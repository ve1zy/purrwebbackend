version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: trello-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trello_like
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trello-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/trello_like?schema=public
      JWT_SECRET: change_me
      JWT_EXPIRES_IN: 7d
      PORT: 3000
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npx prisma generate &&
        node dist/src/main.js
      "

volumes:
  postgres_data:
